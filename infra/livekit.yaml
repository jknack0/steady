# LiveKit server configuration -- local development
port: 7880
rtc:
  port_range_start: 50000
  port_range_end: 60000
  use_external_ip: true
  tcp_port: 7881
keys:
  devkey: devsecret
logging:
  level: info
room:
  max_participants: 2
  empty_timeout: 300

# Redis — required for egress coordination
redis:
  address: redis:6379

# Webhook — API endpoint for session lifecycle events (including egress_ended)
webhook:
  api_key: devkey
  urls:
    - http://host.docker.internal:4000/api/telehealth/webhooks
