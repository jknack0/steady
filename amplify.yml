version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - nvm use 20
            - npm install
            - npx prisma generate --schema=packages/db/prisma/schema.prisma
        build:
          commands:
            - npx turbo run build --filter=@steady/web
      artifacts:
        baseDirectory: apps/web/.next
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
          - apps/web/.next/cache/**/*
