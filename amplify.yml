version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20
        - npm ci --cache .npm --prefer-offline
        - npx prisma generate --schema=packages/db/prisma/schema.prisma
    build:
      commands:
        - npx turbo run build --filter=@steady/web
  artifacts:
    baseDirectory: apps/web/.next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - apps/web/.next/cache/**/*
