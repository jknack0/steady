version: 1
applications:
  - appRoot: apps/web
    frontend:
      phases:
        preBuild:
          commands:
            - nvm use 20
            - cd ../.. && npm install
            - npx prisma generate --schema=packages/db/prisma/schema.prisma
        build:
          commands:
            - cd ../.. && npx turbo run build --filter=@steady/web
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          - "../../node_modules/**/*"
          - .next/cache/**/*
