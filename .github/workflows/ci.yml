name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install --ignore-scripts
      - run: npx prisma generate --schema=packages/db/prisma/schema.prisma
      - run: npx turbo run typecheck --filter=@steady/api --filter=@steady/web --filter=@steady/shared --filter=@steady/db

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install --ignore-scripts
      - run: npx prisma generate --schema=packages/db/prisma/schema.prisma
      - run: npm run build
      - name: Shared tests
        run: cd packages/shared && npx vitest run
      - name: API unit tests
        run: cd packages/api && npx vitest run

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: steady
          POSTGRES_PASSWORD: steady_password
          POSTGRES_DB: steady_adhd_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U steady"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://steady:steady_password@localhost:5432/steady_adhd_test
      JWT_SECRET: test-secret-for-ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install --ignore-scripts
      - run: npx prisma generate --schema=packages/db/prisma/schema.prisma
      - run: npm run build
      - name: Push schema to test DB
        run: npx prisma db push --schema=packages/db/prisma/schema.prisma --skip-generate --accept-data-loss
      - name: Run integration tests
        run: cd packages/api && npx vitest run --config vitest.integration.config.ts

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install --ignore-scripts
      - run: npx prisma generate --schema=packages/db/prisma/schema.prisma
      - run: npx turbo run lint --filter=@steady/api --filter=@steady/web --filter=@steady/shared --filter=@steady/db

  deploy-dev:
    name: Deploy API (Dev)
    needs: [typecheck, unit-tests, integration-tests, lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Dev EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEV_EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm" && . "$NVM_DIR/nvm.sh"
            cd ~/steady
            git pull origin dev
            npm install
            npx prisma generate --schema=packages/db/prisma/schema.prisma
            npx prisma db push --schema=packages/db/prisma/schema.prisma --skip-generate --accept-data-loss
            npx turbo run build --filter=@steady/api
            pm2 restart steady-api

  deploy-prod:
    name: Deploy API (Prod)
    needs: [typecheck, unit-tests, integration-tests, lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Prod EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/steady
            git pull origin main
            npm install
            npx prisma generate --schema=packages/db/prisma/schema.prisma
            npx prisma db push --schema=packages/db/prisma/schema.prisma --skip-generate --accept-data-loss
            npx turbo run build --filter=@steady/api
            pm2 restart steady-api
