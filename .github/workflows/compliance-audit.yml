name: Compliance & Test Audits

on:
  pull_request:
    branches: [main, develop]
  # Also run on manual trigger for periodic audits
  workflow_dispatch:
    inputs:
      audit_type:
        description: 'Which audit to run'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - hipaa
          - tests

jobs:
  hipaa-audit:
    if: ${{ github.event_name == 'pull_request' || github.event.inputs.audit_type == 'both' || github.event.inputs.audit_type == 'hipaa' }}
    name: HIPAA Compliance Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for diff

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Get changed files (PR only)
        if: github.event_name == 'pull_request'
        id: changed
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | tr '\n' ', ')
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Run HIPAA audit on changed files (PR)
        if: github.event_name == 'pull_request'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p \
            "You are a HIPAA compliance auditor. Perform a focused audit on these changed files:
            
            ${{ steps.changed.outputs.files }}
            
            Check for:
            1. PHI in log statements or error messages
            2. PHI in URLs, query parameters, or client-side storage
            3. Missing authentication/authorization on PHI endpoints
            4. Missing encryption for PHI fields
            5. Missing audit logging for PHI access
            6. PHI exposed in API responses beyond minimum necessary
            
            Format your response as:
            ## HIPAA Audit Results
            ### Critical (must fix before merge)
            ### High (should fix before merge)  
            ### Medium (fix soon)
            ### Clean Areas
            
            If no issues found, say 'All clear — no HIPAA compliance issues detected.'
            
            IMPORTANT: You are not a lawyer. This is automated engineering guidance, not legal advice." \
            --allowedTools Read,Grep,Glob \
            --output-format text > hipaa-report.md

          cat hipaa-report.md

          # Fail the check if critical issues found
          if grep -qi "critical" hipaa-report.md; then
            echo "::error::Critical HIPAA compliance issues found. See audit report."
            exit 1
          fi

      - name: Run full HIPAA audit (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p \
            "You are a HIPAA compliance auditor. Perform a comprehensive audit of this entire codebase.
            
            Scan ALL source files for:
            1. PHI in log statements, error messages, or stack traces
            2. PHI in URLs, query parameters, or client-side storage (localStorage, sessionStorage, cookies)
            3. Missing authentication/authorization on endpoints that handle PHI
            4. Missing encryption at rest or in transit for PHI
            5. Missing audit logging for PHI access, creation, modification, deletion
            6. PHI exposed in API responses beyond minimum necessary
            7. Missing session timeout / auto-logoff for PHI access
            8. Missing Cache-Control: no-store headers on PHI responses
            9. Hardcoded credentials or secrets
            10. Third-party integrations sending PHI without BAA documentation
            
            Organize findings by severity: Critical, High, Medium, Low.
            Include file paths and line numbers for each finding.
            End with a list of things done right.
            
            IMPORTANT: You are not a lawyer. This is automated engineering guidance, not legal advice." \
            --allowedTools Read,Grep,Glob,Bash \
            --output-format text > hipaa-full-report.md

          cat hipaa-full-report.md

      - name: Upload HIPAA report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hipaa-audit-report
          path: hipaa-*.md

  test-audit:
    if: ${{ github.event_name == 'pull_request' || github.event.inputs.audit_type == 'both' || github.event.inputs.audit_type == 'tests' }}
    name: Test Coverage Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Get changed files (PR only)
        if: github.event_name == 'pull_request'
        id: changed
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | tr '\n' ', ')
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Run test coverage audit on changed files (PR)
        if: github.event_name == 'pull_request'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p \
            "You are a test coverage auditor. Analyze these changed files and their test coverage:
            
            ${{ steps.changed.outputs.files }}
            
            For each changed source file:
            1. Check if a corresponding test file exists
            2. Check if the test file covers the key functions/endpoints
            3. Flag API endpoints or DB operations without integration tests
            4. Flag user-facing flows without e2e tests
            5. Check for missing error case coverage
            
            Format your response as:
            ## Test Coverage Audit Results
            ### Critical Gaps (no tests at all for changed code)
            ### Integration Test Gaps
            ### E2E Test Gaps  
            ### Adequately Covered
            
            If coverage looks good, say 'All clear — test coverage is adequate for these changes.'" \
            --allowedTools Read,Grep,Glob \
            --output-format text > test-report.md

          cat test-report.md

          # Fail if critical gaps (no tests at all for new code)
          if grep -qi "critical gaps" test-report.md && ! grep -qi "no critical" test-report.md; then
            echo "::warning::Test coverage gaps found for changed files. See audit report."
            # Warning only — doesn't block merge. Change exit 0 to exit 1 to block.
            exit 0
          fi

      - name: Run full test coverage audit (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p \
            "You are a test coverage auditor. Perform a comprehensive audit of this entire codebase's test coverage.
            
            1. Map all test files and what they cover
            2. Identify all source files without corresponding tests
            3. Catalog API endpoints and check for integration tests
            4. Catalog user-facing flows and check for e2e tests
            5. Check for missing error/edge case coverage
            6. Assess test infrastructure (frameworks, utilities, factories, fixtures)
            
            Produce a coverage matrix:
            | Area | Unit | Integration | E2E | Status |
            
            Then list gaps by priority:
            - P0: Critical paths with no test coverage
            - P1: Important paths with partial coverage
            - P2: Nice-to-have coverage improvements
            
            End with infrastructure recommendations." \
            --allowedTools Read,Grep,Glob,Bash \
            --output-format text > test-full-report.md

          cat test-full-report.md

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-audit-report
          path: test-*.md
