version: "3.8"

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: steady
      POSTGRES_PASSWORD: steady_password
      POSTGRES_DB: steady_adhd
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
