version: "3.8"

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: steady
      POSTGRES_PASSWORD: steady_password
      POSTGRES_DB: steady_adhd
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Redis — required by LiveKit Egress for coordination
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  # MinIO — S3-compatible object storage for dev
  # Console: http://localhost:9001 (minioadmin / minioadmin)
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Bootstrap: create the steady-dev bucket on first run
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/steady-dev || true;
      mc anonymous set download local/steady-dev || true;
      echo 'MinIO bucket ready';
      "

  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    depends_on:
      - redis
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    volumes:
      - ./infra/livekit.yaml:/etc/livekit.yaml
    command: ["--config", "/etc/livekit.yaml"]
    environment:
      LIVEKIT_KEYS: "devkey: devsecret"

  # LiveKit Egress — records audio/video and uploads to S3/MinIO
  livekit-egress:
    image: livekit/egress:latest
    restart: unless-stopped
    depends_on:
      - redis
      - livekit
      - minio-init
    cap_add:
      - CAP_SYS_ADMIN
    environment:
      EGRESS_CONFIG_FILE: /etc/egress.yaml
    volumes:
      - ./infra/egress.yaml:/etc/egress.yaml

  # Transcription worker — faster-whisper on GPU
  transcription-worker:
    build:
      context: ./infra/transcription-worker
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - minio-init
    ports:
      - "8000:8000"
    volumes:
      - whisper-models:/root/.cache/huggingface
    environment:
      WHISPER_MODEL: large-v3
      WHISPER_DEVICE: cuda
      WHISPER_COMPUTE_TYPE: float16
      INTERNAL_API_KEY: dev-internal-key
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: steady-dev
      S3_REGION: us-east-2
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  pgdata:
  redisdata:
  miniodata:
  whisper-models:
