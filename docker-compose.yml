version: "3.8"

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: steady
      POSTGRES_PASSWORD: steady_password
      POSTGRES_DB: steady_adhd
    volumes:
      - pgdata:/var/lib/postgresql/data

  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    volumes:
      - ./infra/livekit.yaml:/etc/livekit.yaml
    command: ["--config", "/etc/livekit.yaml"]
    environment:
      LIVEKIT_KEYS: "devkey: devsecret"

volumes:
  pgdata:
