# PHI Detection Pipeline Configuration

pipeline:
  # Which detectors to enable
  detectors:
    regex: true
    ml: true
    context: true
    checksum: true

  # strict = maximize recall (flag everything); balanced = precision/recall tradeoff
  mode: balanced

  # Minimum confidence threshold to include in results
  min_confidence: 0.4

  # Context window size (words before/after) for context detector
  context_window_size: 10

ml:
  # Primary model for clinical NER
  primary_model: "obi/deid_roberta_i2b2"
  # Fallback model
  fallback_model: "en_core_web_trf"
  # Batch size for processing
  batch_size: 8
  # Max sequence length
  max_length: 512
  # Use GPU if available
  use_gpu: true

redaction:
  default_strategy: category

server:
  host: "0.0.0.0"
  port: 8000
